name: pinguru-backend
region: nyc
services:
  - name: api
    github:
      repo: YOUR_GITHUB_USERNAME/pinguru
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: uvicorn app.main:app --host 0.0.0.0 --port ${PORT}
    http_port: 8000
    health_check:
      http_path: /health
    instance_count: 1
    instance_size_slug: basic-xxs # cheapest — free with DO credits
    envs:
      - key: MONGODB_URI
        value: YOUR_MONGODB_ATLAS_URI
        type: SECRET
      - key: META_APP_ID
        value: "933347079475444"
      - key: META_APP_SECRET
        value: YOUR_META_APP_SECRET
        type: SECRET
      - key: META_WEBHOOK_VERIFY_TOKEN
        value: pinguru_webhook_2024 # change this to anything secret
      - key: JWT_SECRET
        value: YOUR_RANDOM_JWT_SECRET
        type: SECRET
      - key: ENCRYPTION_KEY
        value: YOUR_FERNET_ENCRYPTION_KEY
        type: SECRET
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD_HASH
        value: YOUR_BCRYPT_HASH
        type: SECRET
      - key: STRIPE_SECRET_KEY
        value: YOUR_STRIPE_SECRET_KEY
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        value: YOUR_STRIPE_WEBHOOK_SECRET
        type: SECRET
      - key: STRIPE_PRICE_FREE
        value: price_FREE
      - key: STRIPE_PRICE_STARTER_199
        value: price_STARTER_199
      - key: STRIPE_PRICE_PRO_399
        value: price_PRO_399
      - key: BASE_URL
        value: https://pinguru-backend-XXXX.ondigitalocean.app
      - key: FRONTEND_URL
        value: https://your-frontend-domain.com
      - key: ENVIRONMENT
        value: production
