name: Backend Security Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit pytest

      - name: Run enforcement tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          DB_NAME: pinguru_test
          META_APP_ID: test-meta-app-id
          META_APP_SECRET: test-meta-app-secret
          META_WEBHOOK_VERIFY_TOKEN: test-meta-verify-token
          JWT_SECRET: test-jwt-secret-for-ci-only
          ENCRYPTION_KEY: cGluZ3VydS1jaS10ZXN0LWtleS0zMi1ieXRlcyEhISE=
          ENVIRONMENT: test
          DISABLE_WEBHOOK_SIGNATURE: "true"
          RESEND_API_KEY: test-resend-key
          BASE_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:5173
        run: pytest -q

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt

      - name: Static security scan (high severity)
        run: bandit -r app -lll -ii

      - name: Compile check
        run: python -m compileall app